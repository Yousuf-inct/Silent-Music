<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Music | Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; scrollbar-width: thin; scrollbar-color: #555 #000; }
        .spotify-gradient { background: linear-gradient(to bottom, #222, #000); }
        .song-card:hover .play-btn { opacity: 1; transform: translateY(0); }
        input[type="range"] { accent-color: #1DB954; cursor: pointer; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <div class="flex flex-1 overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-black p-6 hidden md:flex flex-col gap-6">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i class="fa-brands fa-spotify text-green-500 text-3xl"></i> Silent
            </h1>
            <nav class="space-y-4">
                <a href="#" class="flex items-center gap-4 text-gray-400 hover:text-white transition"><i class="fa-solid fa-house"></i> Home</a>
                <a href="#" class="flex items-center gap-4 text-gray-400 hover:text-white transition"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
                <a href="#" class="flex items-center gap-4 text-gray-400 hover:text-white transition"><i class="fa-solid fa-lines-leaning"></i> Library</a>
            </nav>
            <div class="mt-8">
                <button id="login-google" class="w-full py-2 bg-white text-black font-bold rounded-full hover:scale-105 transition">Login</button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto spotify-gradient p-8 pb-32">
            <header class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold" id="greeting">Good evening</h2>
            </header>

            <section>
                <h3 class="text-xl font-bold mb-4">Trending Music</h3>
                <div id="song-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
                    <!-- JS will inject song cards here -->
                </div>
            </section>
        </main>
    </div>

    <!-- PLAYER BAR -->
    <footer class="h-24 bg-zinc-900 border-t border-zinc-800 px-4 flex items-center justify-between fixed bottom-0 w-full">
        <!-- Song Info -->
        <div class="flex items-center gap-4 w-1/3">
            <img id="player-cover" src="https://via.placeholder.com/60" class="w-14 h-14 rounded shadow-lg" alt="">
            <div>
                <div id="player-title" class="text-sm font-semibold truncate max-w-[150px]">Select a song</div>
                <div id="player-artist" class="text-xs text-gray-400">Artist</div>
            </div>
            <i class="fa-regular fa-heart hover:text-green-500 cursor-pointer transition ml-4"></i>
        </div>

        <!-- Controls -->
        <div class="flex flex-col items-center w-1/3 gap-2">
            <div class="flex items-center gap-6">
                <i id="prev" class="fa-solid fa-backward-step text-gray-400 hover:text-white cursor-pointer text-xl"></i>
                <div id="play-pause" class="w-10 h-10 bg-white rounded-full flex items-center justify-center cursor-pointer hover:scale-105 transition">
                    <i class="fa-solid fa-play text-black"></i>
                </div>
                <i id="next" class="fa-solid fa-forward-step text-gray-400 hover:text-white cursor-pointer text-xl"></i>
            </div>
            <div class="flex items-center gap-2 w-full max-w-md">
                <span id="current-time" class="text-[10px] text-gray-400">0:00</span>
                <input type="range" id="progress-bar" value="0" class="w-full h-1 bg-gray-600 rounded-lg appearance-none">
                <span id="duration-time" class="text-[10px] text-gray-400">0:00</span>
            </div>
        </div>

        <!-- Volume -->
        <div class="flex items-center justify-end gap-3 w-1/3">
            <i class="fa-solid fa-volume-high text-gray-400"></i>
            <input type="range" id="volume-bar" value="80" class="w-24 h-1">
        </div>
    </footer>

    <!-- Firebase SDKs -->
    <script type="module" src="app.js"></script>
</body>
</html>
