<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Pro | Stream High-Fidelity Music</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <!-- NAVIGATION SIDEBAR -->
        <aside class="sidebar-container">
            <div class="brand">
                <div class="brand-logo"><i class="fa-brands fa-spotify"></i></div>
                <span class="brand-name">Silent Pro</span>
            </div>

            <nav class="primary-nav">
                <a href="#" class="nav-link active" data-view="home">
                    <i class="fa-solid fa-house"></i> <span>Home</span>
                </a>
                <a href="#" class="nav-link" data-view="search">
                    <i class="fa-solid fa-magnifying-glass"></i> <span>Search</span>
                </a>
                <a href="#" class="nav-link" data-view="library">
                    <i class="fa-solid fa-lines-leaning"></i> <span>Your Library</span>
                </a>
            </nav>

            <div class="library-actions">
                <div class="action-item"><div class="plus-box"><i class="fa-solid fa-plus"></i></div> <span>Create Playlist</span></div>
                <div class="action-item"><div class="heart-box"><i class="fa-solid fa-heart"></i></div> <span>Liked Songs</span></div>
            </div>

            <div class="sidebar-divider"></div>

            <div class="playlist-container" id="playlist-nav-list">
                <!-- Dynamic Playlists -->
                <a href="#" class="playlist-link">Heavy Metal Classics</a>
                <a href="#" class="playlist-link">Coding Focus Lo-Fi</a>
                <a href="#" class="playlist-link">Morning Coffee Jazz</a>
            </div>
        </aside>

        <!-- MAIN VIEWPORT -->
        <main class="viewport">
            <header class="view-header" id="dynamic-header">
                <div class="header-controls">
                    <button class="circle-btn"><i class="fa-solid fa-chevron-left"></i></button>
                    <button class="circle-btn"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="user-actions">
                    <button class="upgrade-btn">Explore Premium</button>
                    <div class="profile-pill" id="auth-trigger">
                        <i class="fa-solid fa-circle-user"></i>
                        <span id="user-display-name">Sign In</span>
                        <i class="fa-solid fa-caret-down"></i>
                    </div>
                </div>
            </header>

            <div class="view-content">
                <!-- HERO GRADIENT SECTION -->
                <section class="content-block hero-bg">
                    <h2 class="section-title">Good evening</h2>
                    <div class="quick-grid">
                        <!-- Six large cards for recent plays -->
                        <div class="quick-card">
                            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=300" alt="">
                            <span>Liked Songs</span>
                            <button class="quick-play"><i class="fa-solid fa-play"></i></button>
                        </div>
                        <!-- ... more cards ... -->
                    </div>
                </section>

                <section class="content-block">
                    <div class="section-header">
                        <h3>Made For You</h3>
                        <a href="#">Show all</a>
                    </div>
                    <div class="media-shelf" id="featured-shelf">
                        <!-- Skeleton Loaders appear here initially -->
                    </div>
                </section>

                <section class="content-block">
                    <div class="section-header">
                        <h3>Recently Played</h3>
                        <a href="#">Show all</a>
                    </div>
                    <div class="media-shelf" id="recent-shelf"></div>
                </section>
            </div>
        </main>

        <!-- PERSISTENT PLAYER BAR -->
        <footer class="player-wrapper">
            <div class="active-track-info">
                <img src="https://via.placeholder.com/60" id="track-art" alt="">
                <div class="track-meta">
                    <div class="track-name marquee" id="track-title">Welcome to Silent</div>
                    <div class="track-artist" id="track-artist">Select music to begin</div>
                </div>
                <button class="heart-btn"><i class="fa-regular fa-heart"></i></button>
            </div>

            <div class="player-engine">
                <div class="engine-controls">
                    <button class="eng-btn" id="shuffle-toggle"><i class="fa-solid fa-shuffle"></i></button>
                    <button class="eng-btn" id="prev-btn"><i class="fa-solid fa-backward-step"></i></button>
                    <button class="master-play-btn" id="play-pause-btn"><i class="fa-solid fa-play"></i></button>
                    <button class="eng-btn" id="next-btn"><i class="fa-solid fa-forward-step"></i></button>
                    <button class="eng-btn" id="repeat-toggle"><i class="fa-solid fa-repeat"></i></button>
                </div>
                <div class="playback-bar-container">
                    <span class="time-label" id="current-time">0:00</span>
                    <div class="seek-slider" id="seek-slider">
                        <div class="seek-progress" id="seek-progress"></div>
                        <div class="seek-handle"></div>
                    </div>
                    <span class="time-label" id="total-time">0:00</span>
                </div>
            </div>

            <div class="auxiliary-controls">
                <button class="aux-btn"><i class="fa-solid fa-microphone"></i></button>
                <button class="aux-btn"><i class="fa-solid fa-list-ul"></i></button>
                <button class="aux-btn"><i class="fa-solid fa-computer"></i></button>
                <div class="volume-module">
                    <i class="fa-solid fa-volume-high"></i>
                    <div class="vol-slider">
                        <div class="vol-progress" id="vol-level" style="width: 70%;"></div>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <!-- FIREBASE CORE -->
    <script type="module" src="app.js"></script>
</body>
</html>
